name: Build and Publish PDF

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Compile main.tex
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: false
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Upload compiled PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: bjtu-paper-template-pdf
          path: main.pdf

      - name: Prepare GitHub Pages site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p public
          cp main.pdf public/BJTU-Research-Paper-Template.pdf
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>BJTU Research Paper Template</title>
            <style>
              :root {
                color-scheme: light;
                --bjtu-blue: #003690;
                --ink: #172033;
                --muted: #5f6b7a;
                --bg: #f5f7fb;
                --card: #ffffff;
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                color: var(--ink);
                background: radial-gradient(circle at top left, #e7eefb 0, transparent 32rem), var(--bg);
              }
              main {
                width: min(1120px, calc(100% - 32px));
                margin: 0 auto;
                padding: 48px 0;
              }
              .hero {
                padding: 32px;
                border-radius: 24px;
                background: var(--card);
                box-shadow: 0 18px 50px rgba(20, 39, 75, 0.12);
                border: 1px solid rgba(0, 54, 144, 0.12);
              }
              h1 {
                margin: 0 0 12px;
                font-size: clamp(2rem, 5vw, 3.5rem);
                line-height: 1.05;
                letter-spacing: -0.04em;
              }
              p {
                margin: 0;
                color: var(--muted);
                font-size: 1.05rem;
                line-height: 1.65;
              }
              .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                margin-top: 24px;
              }
              a.button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 44px;
                padding: 0 18px;
                border-radius: 999px;
                text-decoration: none;
                font-weight: 700;
              }
              .primary {
                color: #fff;
                background: var(--bjtu-blue);
              }
              .secondary {
                color: var(--bjtu-blue);
                background: #edf3ff;
              }
              iframe {
                width: 100%;
                height: min(86vh, 980px);
                margin-top: 24px;
                border: 1px solid rgba(0, 54, 144, 0.14);
                border-radius: 20px;
                background: #fff;
                box-shadow: 0 18px 50px rgba(20, 39, 75, 0.10);
              }
            </style>
          </head>
          <body>
            <main>
              <section class="hero">
                <h1>BJTU Research Paper Template</h1>
                <p>A GitHub Pages preview generated automatically from the latest successful LaTeX build on the main branch.</p>
                <div class="actions">
                  <a class="button primary" href="BJTU-Research-Paper-Template.pdf">Open PDF</a>
                  <a class="button secondary" href="https://github.com/ke-xing/BJTU-Research-Paper-Template">View on GitHub</a>
                </div>
              </section>
              <iframe src="BJTU-Research-Paper-Template.pdf" title="BJTU Research Paper Template PDF preview"></iframe>
            </main>
          </body>
          </html>
          HTML

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
